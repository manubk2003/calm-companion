<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Calm Companion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100dvh;display:flex;flex-direction:column}
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;padding:20px;gap:16px}
#setup h1{font-size:1.5rem;color:#a78bfa}
#setup input{width:100%;max-width:320px;padding:12px;border-radius:8px;border:1px solid #444;background:#2a2a3e;color:#fff;font-size:1rem}
#setup button{padding:12px 32px;border-radius:8px;border:none;background:#7c3aed;color:#fff;font-size:1rem;cursor:pointer}
#setup a{color:#a78bfa;font-size:0.85rem}
#chat{display:none;flex-direction:column;height:100%}
#messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:12px 16px;border-radius:16px;line-height:1.4;font-size:1rem}
.user{align-self:flex-end;background:#7c3aed;color:#fff;border-bottom-right-radius:4px}
.assistant{align-self:flex-start;background:#2a2a3e;color:#e0e0e0;border-bottom-left-radius:4px}
#input-area{display:flex;align-items:center;gap:8px;padding:12px;background:#16162a;border-top:1px solid #333}
#text-input{flex:1;padding:10px;border-radius:20px;border:1px solid #444;background:#2a2a3e;color:#fff;font-size:1rem;display:none}
#mic-btn{width:64px;height:64px;border-radius:50%;border:none;background:#7c3aed;color:#fff;font-size:1.5rem;cursor:pointer;margin:0 auto;transition:all .2s}
#mic-btn.recording{background:#ef4444;animation:pulse 1s infinite}
#toggle-text{background:none;border:none;color:#888;font-size:0.8rem;cursor:pointer;padding:4px 8px}
#reset-key{background:none;border:none;color:#666;font-size:0.7rem;cursor:pointer;position:absolute;top:8px;right:8px}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.thinking{opacity:0.6;font-style:italic}
</style>
</head>
<body>

<div id="setup">
<h1>🧘 Calm Companion</h1>
<p style="text-align:center;color:#aaa;max-width:300px">Your panic recovery coach. Voice-first, always available.</p>
<input id="api-key" type="password" placeholder="Paste your Groq API key">
<button onclick="saveKey()">Start</button>
<a href="https://console.groq.com/keys" target="_blank">Get free Groq key →</a>
<p style="font-size:0.75rem;color:#666">Key is stored locally on your device only.</p>
</div>

<div id="chat">
<button id="reset-key" onclick="resetKey()">⚙️ Change key</button>
<div id="messages"></div>
<div id="input-area">
<button id="toggle-text" onclick="toggleText()">⌨️ type</button>
<input id="text-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendText()">
<button id="mic-btn" onclick="toggleMic()">🎤</button>
</div>
</div>

<script>
const SYSTEM_PROMPT = `You are Calm Companion, a supportive panic recovery coach. You know the user's context:

- They have panic disorder, specifically fear of panic attacks while driving alone
- Baseline: could only drive 1 minute alone at worst → now at 30 min / 20 km
- Current goal: 35 min / 23 km by May 22, 2026
- They have a therapist (active)
- Key safety behavior to reduce: calling wife during drives
- They are doing graded exposure therapy

Your role:
- If they're panicking NOW: guide them through grounding (5-4-3-2-1), slow breathing (4-7-8), and remind them panic peaks in 10 min and always passes
- If checking in: celebrate progress, ask about the drive, note anxiety level
- Keep responses SHORT (2-4 sentences) since they may be driving
- Warm, calm, confident tone — like a coach who believes in them
- Never minimize their feelings, but gently remind them of their track record
- Remind them: success = "felt uncomfortable and stayed" not "felt nothing"`;

let messages = [];
let recognition, speaking = false, apiKey;

function saveKey() {
  const key = document.getElementById('api-key').value.trim();
  if (!key) return;
  localStorage.setItem('groq_key', key);
  apiKey = key;
  startChat();
}

function resetKey() {
  localStorage.removeItem('groq_key');
  location.reload();
}

function startChat() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  addMsg("Hey, I'm here. How are you feeling right now?", 'assistant');
  speak("Hey, I'm here. How are you feeling right now?");
}

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.textContent = text;
  document.getElementById('messages').appendChild(div);
  document.getElementById('messages').scrollTop = 99999;
}

function toggleText() {
  const inp = document.getElementById('text-input');
  inp.style.display = inp.style.display === 'none' ? 'block' : 'none';
}

function toggleMic() {
  if (speaking) { window.speechSynthesis.cancel(); speaking = false; }
  const btn = document.getElementById('mic-btn');
  if (!recognition) {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { alert('Speech recognition not supported. Please use Chrome.'); return; }
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.continuous = false;
    recognition.onresult = (e) => {
      const text = e.results[0][0].transcript;
      if (text.trim()) sendMessage(text);
    };
    recognition.onend = () => btn.classList.remove('recording');
    recognition.onerror = (e) => {
      btn.classList.remove('recording');
      if (e.error === 'not-allowed') alert('Please allow microphone access.');
    };
  }
  if (btn.classList.contains('recording')) {
    recognition.stop();
  } else {
    btn.classList.add('recording');
    try { recognition.start(); } catch(e) { recognition.stop(); setTimeout(() => recognition.start(), 100); }
  }
}

function sendText() {
  const inp = document.getElementById('text-input');
  if (!inp.value.trim()) return;
  sendMessage(inp.value.trim());
  inp.value = '';
}

async function sendMessage(text) {
  addMsg(text, 'user');
  messages.push({role: "user", content: text});

  const thinking = document.createElement('div');
  thinking.className = 'msg assistant thinking';
  thinking.textContent = '...';
  document.getElementById('messages').appendChild(thinking);

  try {
    const body = {
      model: "llama-3.1-8b-instant",
      messages: [{role: "system", content: SYSTEM_PROMPT}, ...messages],
      max_tokens: 200
    };

    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.error) {
      thinking.remove();
      addMsg("Error: " + data.error.message, 'assistant');
      return;
    }
    const reply = data.choices?.[0]?.message?.content || "I'm here with you. Try again?";
    thinking.remove();
    addMsg(reply, 'assistant');
    messages.push({role: "assistant", content: reply});
    speak(reply);
  } catch(e) {
    thinking.remove();
    addMsg("Offline. Remember: breathe in 4, hold 7, out 8. Panic always passes.", 'assistant');
  }
}

function speak(text) {
  if (!window.speechSynthesis) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.rate = 0.9;
  utter.pitch = 1;
  speaking = true;
  utter.onend = () => speaking = false;
  window.speechSynthesis.speak(utter);
}

// Init
apiKey = localStorage.getItem('groq_key');
if (apiKey) startChat();
</script>
</body>
</html>
